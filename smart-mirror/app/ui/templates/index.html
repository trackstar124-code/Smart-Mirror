<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mirror</title>
    <!-- You'll add a stylesheet link here later, e.g.:
         <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> -->
</head>
<body>
    <!-- This is the page Flask serves once you switch index() to render_template.
         For now it's a simple placeholder. In Week 2 you'll add widgets here:
         a clock, the date, and the weather. -->
    <h1>Smart Mirror</h1>
        <div id="clock">
            <div class="time">{{ clock.time }}</div>
            <div class="date">{{ clock.date }}</div>
        </div>
</body>
</html>
