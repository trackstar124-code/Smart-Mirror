<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mirror</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1></h1>
        <div id="clock">
            <div class="date">{{ clock.date }}</div>
            <div class="time">{{ clock.time }}</div>
        </div>
        <div id="weather">
            <div class="current">
                <div class="temp">{{ weather.temp }}°F</div>
                <img src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png" alt="weather">
            </div>
            <div class="city">{{ weather.city }}</div>
        </div>
        <div id="events">
            {% for event in events %}
                <div class="event">{{ event.date }} — {{ event.title }}</div>
            {% endfor %}
        </div>
</body>
</html>
